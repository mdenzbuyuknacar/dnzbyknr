<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>İnteraktif Dijital Sanat - Gerçek Duman</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden; 
      background-color: #000;
      color: white;
      font-family: sans-serif;
    }
    canvas {
      display: block; 
    }
  </style>
</head>
<body>
  <script>
    let video;
    let bodySegmentation;
    let segmentation;

    function preload() {
      let options = { maskType: "background" };
      bodySegmentation = ml5.bodySegmentation("SelfieSegmentation", options);
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(1); 

      video = createCapture(VIDEO);
      video.size(640, 480);
      video.hide(); 

      bodySegmentation.detectStart(video, gotResults);
    }

    function gotResults(results) {
      segmentation = results;
    }

    function draw() {
      if (segmentation) {
        // 1. DUMAN İZİ (Arka planın yavaşça silinmesi)
        // Parlaklığı engellemek için iz silinme hızını biraz dengeledik
        blendMode(BLEND);
        fill(0, 25); 
        noStroke();
        rect(0, 0, width, height);

        video.mask(segmentation.mask);

        push();
        translate(width, 0);
        scale(-1, 1);

        let scaleFactor = max(width / video.width, height / video.height);
        let drawW = video.width * scaleFactor;
        let drawH = video.height * scaleFactor;

        // 2. ANA BEDEN (Seni merkeze çiziyoruz, böylece hayalet gibi kaybolmazsın)
        // Vücudun biraz koyu ve mat görünecek
        tint(200, 200, 200, 255); 
        imageMode(CENTER);
        image(video, width / 2, height / 2, drawW, drawH);

        // 3. DUMAN KATMANLARI (Bedenden kopan gaz bulutları)
        // Artık SCREEN (Parlak) değil, normal BLEND (Mat) kullanıyoruz
        for (let i = 1; i < 12; i++) {
          
          // Rüzgarda yavaşça sağa sola süzülme
          let noiseX = (noise(frameCount * 0.01, i * 10) - 0.5) * (60 * i);
          
          // Yukarı doğru ağır ağır yükselme (Duman fiziği)
          let noiseY = -(i * 15) - (noise(frameCount * 0.02, i * 10) * (20 * i));

          // Kıvrılma
          let rot = (noise(frameCount * 0.005, i * 5) - 0.5) * (0.1 * i);

          // Dışarı doğru genleşme (Duman dağılırken büyür)
          let s = 1 + (i * 0.07);

          // Şeffaflık: Çok daha düşük! (Göz almasın, sis gibi dursun diye)
          let alphaValue = map(i, 1, 11, 40, 0);

          // DUMANIN RENGİ: Mat Kurşuni Gri / Koyu Sis rengi
          // RGB değerlerini düşük tutarak parlamayı tamamen bitirdik.
          tint(100, 110, 120, alphaValue);

          push();
          // Katmanları ekrana yerleştir
          translate(width / 2 + noiseX, height / 2 + noiseY);
          rotate(rot);
          scale(s);
          image(video, 0, 0, drawW, drawH);
          pop();
        }
        pop();
      } else {
        background(0);
        fill(255);
        textAlign(CENTER, CENTER);
        textSize(18);
        text("Mat duman efekti yükleniyor...\nLütfen bekleyin.", width / 2, height / 2);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
